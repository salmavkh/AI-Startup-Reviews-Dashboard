name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push main to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::HF_TOKEN is missing. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          HUB_URL="https://salmavkh:${HF_TOKEN}@huggingface.co/spaces/salmavkh/AI-Startup-Reviews"
          if ! git ls-remote "${HUB_URL}" >/dev/null 2>&1; then
            echo "::error::Could not authenticate to Hugging Face Space. Verify HF_TOKEN is valid and has write access."
            exit 1
          fi
          # HF may reject binary files present anywhere in pushed history.
          # Build a clean, single-commit snapshot for HF (no Git history), then
          # remove PDFs from that snapshot before force-pushing.
          tmp_dir="$(mktemp -d)"
          git archive --format=tar HEAD | tar -xf - -C "${tmp_dir}"
          cd "${tmp_dir}"

          if find . -type f -name '*.pdf' | grep -q .; then
            echo "Removing PDFs from HF snapshot:"
            find . -type f -name '*.pdf' -print -delete
          fi

          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync to HF Space snapshot (exclude unsupported binary files)"

          git remote add hf "${HUB_URL}"
          git push --force hf main:main
